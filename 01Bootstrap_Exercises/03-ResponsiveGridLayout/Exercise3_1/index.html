<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Responsive Grid</title>

    <link rel="stylesheet"
          href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center text-primary mb-5">
        Responsive Grid Layout
    </h1>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card text-white bg-primary p-4 text-center shadow">
                Column 1
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card text-white bg-success p-4 text-center shadow">
                Column 2
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card text-white bg-danger p-4 text-center shadow">
                Column 3
            </div>
        </div>

    </div>

</div>

</body>
</html>
