<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Column Reordering</title>

    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"/>
  </head>
  <body>
    <div class="container py-5">
      <div class="row g-3">
        <div class="col-md-6 order-md-2 bg-primary text-white p-4 text-center">
          First in HTML, Second on Desktop
        </div>
        <div class="col-md-6 order-md-1 bg-success text-white p-4 text-center">
          Second in HTML, First on Desktop
        </div>
      </div>
    </div>
  </body>
</html>
