<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Typography</title>
    <link
      rel="stylesheet"
      href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="display-1 text-primary">Display Heading</h1>
      <p class="lead">This is a lead paragraph.</p>
      <p class="text-muted">This text appears muted and lighter.</p>
      <p class="fw-bold">This text is bold.</p>
      <p class="fst-italic">This text is italic.</p>
      <p class="text-decoration-underline">This text is underlined.</p>
    </div>
  </body>
</html>
