<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Transform</title>
    <link
      rel="stylesheet"
      href="../../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container py-5">
      <p class="text-uppercase">this text becomes uppercase</p>
      <p class="text-lowercase">THIS TEXT BECOMES LOWERCASE</p>
      <p class="text-capitalize">this text becomes capitalized</p>
    </div>
  </body>
</html>
